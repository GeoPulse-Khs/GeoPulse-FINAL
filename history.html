<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sensor Data Logger</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #f4f4f4; }
  </style>
</head>
<body>
  <h1>Sensor Data Logger</h1>

  <!-- Table for displaying sensor data -->
  <table id="sensorTable">
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>Gyro</th>
        <th>Moisture</th>
        <th>Rainfall</th>
        <th>Vibration</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    // Firebase init
    const firebaseConfig = {
      apiKey: "AIzaSyBPkCOrLoVuStEvhzWQeCkm3QdD7MK3syI",
      authDomain: "iotdb-629a2.firebaseapp.com",
      databaseURL: "https://geopulse-khs2025-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "iotdb-629a2",
      storageBucket: "iotdb-629a2.appspot.com",
      messagingSenderId: "977422517110",
      appId: "1:977422517110:web:a2e438ac42269d21b1b057"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Function to store one full set of sensor readings
    function logSensorSet(gyro, moisture, rainfall, vibration) {
      db.ref("logs").push({
        gyro: gyro,
        moisture: moisture,
        rainfall: rainfall,
        vibration: vibration,
        timestamp: new Date().toISOString()
      });
    }

    // Listen for new sensor sets and update table
    db.ref("logs").on("child_added", snap => {
      const data = snap.val();
      addRow(data.timestamp, data.gyro, data.moisture, data.rainfall, data.vibration);
    });

    // Add a row to the table
    function addRow(timestamp, gyro, moisture, rainfall, vibration) {
      const tbody = document.getElementById("sensorTable").querySelector("tbody");
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${timestamp}</td>
        <td>${gyro}</td>
        <td>${moisture}</td>
        <td>${rainfall}</td>
        <td>${vibration}</td>
      `;
      tbody.appendChild(row);
    }

    // Example: simulate storing new sensor readings every 5 seconds
    setInterval(() => {
      logSensorSet(
        (Math.random() * 360).toFixed(2), // Gyro
        (Math.random() * 100).toFixed(2), // Moisture
        (Math.random() * 50).toFixed(2),  // Rainfall
        (Math.random() * 10).toFixed(2)   // Vibration
      );
    }, 5000);
  </script>
</body>
</html>
