<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sensor Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #history table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    #history th, #history td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    #history th { background-color: #f4f4f4; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
  <h2>Kapitolyo High School IoT Dashboard</h2>

  <!-- Sensor History -->
  <div id="history">
    <h3>Sensor History</h3>
    <table>
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Roll</th>
          <th>Pitch</th>
          <th>Yaw</th>
          <th>Vibration</th>
          <th>Moisture</th>
          <th>Rainfall</th>
        </tr>
      </thead>
      <tbody id="history-body"></tbody>
    </table>
  </div>

  <script>
    // Firebase init
    const firebaseConfig = {
      apiKey: "AIzaSyBPkCOrLoVuStEvhzWQeCkm3QdD7MK3syI",
      authDomain: "iotdb-629a2.firebaseapp.com",
      databaseURL: "https://geopulse-khs2025-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "iotdb-629a2",
      storageBucket: "iotdb-629a2.appspot.com",
      messagingSenderId: "977422517110",
      appId: "1:977422517110:web:a2e438ac42269d21b1b057"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Function to add new row to history (indefinite log)
    function addHistoryRow(values) {
      const timestamp = new Date().toLocaleString();
      const tbody = document.getElementById("history-body");
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${timestamp}</td>
        <td>${values.Roll || 0}</td>
        <td>${values.Pitch || 0}</td>
        <td>${values.Yaw || 0}</td>
        <td>${values.Vibration || 0}</td>
        <td>${values.Moisture || 0}</td>
        <td>${values.Rainfall || 0}</td>
      `;

      tbody.appendChild(row);
      // Keeps readings indefinitely (no deletion)
    }

    // Firebase listeners for live updates
    const sensorRefs = ["Roll", "Pitch", "Yaw", "Vibration", "Moisture", "Rainfall"];
    const sensorValues = {};

    sensorRefs.forEach(ref => {
      db.ref(ref).on("value", snap => {
        sensorValues[ref] = snap.val();
        addHistoryRow(sensorValues);
      });
    });
  </script>
</body>
</html>
