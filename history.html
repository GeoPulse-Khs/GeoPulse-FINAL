<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sensor Data Logger</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #f4f4f4; }
  </style>
</head>
<body>
  <h1>Sensor Data Logger</h1>

  <!-- Table for displaying sensor data -->
  <table id="sensorTable">
    <thead>
      <tr>
        <th>Sensor</th>
        <th>Value</th>
        <th>Timestamp</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    // Firebase init
    const firebaseConfig = {
      apiKey: "AIzaSyBPkCOrLoVuStEvhzWQeCkm3QdD7MK3syI",
      authDomain: "iotdb-629a2.firebaseapp.com",
      databaseURL: "https://geopulse-khs2025-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "iotdb-629a2",
      storageBucket: "iotdb-629a2.appspot.com",
      messagingSenderId: "977422517110",
      appId: "1:977422517110:web:a2e438ac42269d21b1b057"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Function to store sensor data with timestamp
    function logSensorData(sensorName, value) {
      db.ref(`logs/${sensorName}`).push({
        value: value,
        timestamp: new Date().toISOString()
      });
    }

    // Listen for new data and update table
    const sensors = ["Vibration", "Moisture", "Yaw", "Rainfall"];
    sensors.forEach(sensor => {
      db.ref(`logs/${sensor}`).on("child_added", snap => {
        const data = snap.val();
        addRow(sensor, data.value, data.timestamp);
      });
    });

    // Add a row to the table
    function addRow(sensor, value, timestamp) {
      const tbody = document.getElementById("sensorTable").querySelector("tbody");
      const row = document.createElement("tr");
      row.innerHTML = `<td>${sensor}</td><td>${value}</td><td>${timestamp}</td>`;
      tbody.appendChild(row);
    }

    // Example: simulate storing new sensor readings every 5 seconds
    setInterval(() => {
      logSensorData("Vibration", (Math.random() * 10).toFixed(2));
      logSensorData("Moisture", (Math.random() * 100).toFixed(2));
      logSensorData("Yaw", (Math.random() * 360).toFixed(2));
      logSensorData("Rainfall", (Math.random() * 50).toFixed(2));
    }, 5000);
  </script>
</body>
</html>
